<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            border-radius: 5px;
        }
        main {
            background-color: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Bem-vindo</h1>
    </header>
    
    <main>
        <h2>Conteúdo Principal</h2>
        <p>Esta é uma página HTML simples com estrutura básica.</p>
    </main>
    
    <footer>
        <p>&copy; 2026 Meu Projeto</p>
    </footer>
</body>
</html>
